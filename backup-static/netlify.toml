# ── Bosecrafts — Netlify configuration ──────────────────────────────────────

[build]
  publish = "."
  # No build command — pure static HTML, deploy as-is

# ── Redirects ───────────────────────────────────────────────────────────────
# Canonicalise to non-www
[[redirects]]
  from   = "https://www.bosecrafts.com/*"
  to     = "https://bosecrafts.com/:splat"
  status = 301
  force  = true

# ── Headers ─────────────────────────────────────────────────────────────────

# HTML pages — always fresh in the browser; CDN serves stale while revalidating
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control             = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=0, stale-while-revalidate=86400"
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "SAMEORIGIN"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# CSS — versioned via ?v= query string; safe to cache 1 year
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS — 1-year cache; bump filename or add ?v= to invalidate in browsers
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — immutable; use unique filenames when you replace/update images
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SVG / fonts served locally (future-proofed)
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control               = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# ── Netlify Image CDN ────────────────────────────────────────────────────────
# When you add real images, reference them like:
#   /.netlify/images?url=/assets/img/projects/yourfile.jpg&w=800&fm=avif&q=80
# No extra config needed for local images.
